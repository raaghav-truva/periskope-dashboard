name: Update Periskope Dashboard Data

on:
  schedule:
    # Runs daily at 03:23 UTC (~8:53am IST). Off the exact hour on purpose —
    # GitHub explicitly warns that top-of-the-hour (":00") cron slots are the
    # most oversubscribed and most likely to be delayed or silently dropped.
    - cron: '23 3 * * *'
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest data from Periskope
        env:
          PERISKOPE_API_KEY: ${{ secrets.PERISKOPE_API_KEY }}
          # Optional — enables the Airtable sync-check section. Safe to leave
          # unset; the script just skips that section if it's missing.
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python fetch_periskope_data.py

      - name: Commit updated data.json and history.json
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add data.json history.json
          git diff --cached --quiet || git commit -m "Daily data refresh"
          git push
