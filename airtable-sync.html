<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  try {
    var t = localStorage.getItem('truva-theme');
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', t);
  } catch(e) {}
})();
</script>
<meta charset="UTF-8">
<title>Truva Home Loans — Airtable Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --panel:#F6F6F5;
    --panel-2:#ECEBE9;
    --line:#E3E1DE;
    --text:#141414;
    --muted:#6E6B67;
    --accent:#FF4802;
    --accent-2:#FF7A40;
    --warn:#D6304A;
    --font-display: 'Poppins', sans-serif;
    --font-body: 'Poppins', sans-serif;
    --font-mono: 'Poppins', sans-serif;
  }
  html[data-theme="dark"]{
    --bg:#0A0A0A;
    --panel:#151515;
    --panel-2:#1E1E1E;
    --line:#2E2A28;
    --text:#F5F1EC;
    --muted:#9C948C;
    --accent:#FF4802;
    --accent-2:#FF8A50;
    --warn:#E5484D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    padding:40px 24px 80px;
    transition:background .2s ease,color .2s ease;
  }
  .wrap{max-width:1100px;margin:0 auto;}

  .nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;border-bottom:1px solid var(--line);}
  .nav-links{display:flex;flex-wrap:wrap;}
  .nav-links a{
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    text-decoration:none;
    padding:0 0 14px;
    margin-right:28px;
    border-bottom:2px solid transparent;
    transition:color .15s ease,border-color .15s ease;
  }
  .nav-links a:hover{color:var(--text);}
  .nav-links a.active{color:var(--accent);border-bottom-color:var(--accent);}
  .theme-toggle{
    margin-bottom:10px;
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    font-family:var(--font-body);
    font-size:11px;
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:0.08em;
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
    transition:border-color .15s ease,color .15s ease;
    white-space:nowrap;
  }
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}

  .logo{height:48px;display:block;margin-bottom:18px;}

  header{margin-bottom:36px;border-bottom:1px solid var(--line);padding-bottom:24px;}
  .eyebrow{
    font-family:var(--font-mono);
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:0.12em;
    font-size:11px;
    color:var(--accent);
    margin-bottom:10px;
  }
  h1{
    font-family:var(--font-display);
    font-size:34px;
    font-weight:600;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .sub{color:var(--muted);font-size:14px;max-width:640px;line-height:1.5;}
  .refresh-note{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--muted);
    margin-top:14px;
  }

  .modal-overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,0.55);
    align-items:center;justify-content:center;
    z-index:100;
    padding:24px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    max-width:480px;width:100%;
    max-height:80vh;
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .modal-header{
    padding:18px 20px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;
  }
  .modal-header .title{font-family:var(--font-display);font-size:17px;font-weight:600;}
  .modal-header .count-badge{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:4px;}
  .modal-close{
    background:none;border:none;color:var(--muted);
    font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;
  }
  .modal-close:hover{color:var(--text);}
  .modal-body{overflow-y:auto;padding:4px 0;}
  .contact-row{
    display:flex;justify-content:space-between;gap:12px;
    padding:10px 20px;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .contact-row:last-child{border-bottom:none;}
  .contact-row .cname{color:var(--text);}
  .contact-row .cphone{font-family:var(--font-mono);color:var(--muted);white-space:nowrap;}
  .cdetail{font-size:11px;color:var(--muted);margin-top:3px;}
  .modal-empty{padding:30px 20px;color:var(--muted);font-size:13px;text-align:center;line-height:1.6;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;}
  td.num{font-family:var(--font-mono);text-align:right;}
  td.num.clickable{cursor:pointer;color:var(--accent);text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .15s ease;}
  td.num.clickable:hover{text-decoration-color:var(--accent);}
  td.num.zero{color:var(--muted);}

  .footnote{color:var(--muted);font-size:11px;margin-top:8px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">

  <nav class="nav">
    <div class="nav-links">
      <a href="index.html">Overview</a>
      <a href="message-analytics.html">Message Analytics</a>
      <a href="airtable-sync.html" class="active">Airtable Sync</a>
    </div>
    <button class="theme-toggle" id="theme-toggle" type="button">Dark</button>
  </nav>

  <header>
    <img src="logo.png" alt="Truva" class="logo" onerror="this.style.display='none'">
    <div class="eyebrow">Truva Home Loans · Periskope Pipeline</div>
    <h1>Airtable Sync</h1>
    <div class="sub">Cross-checking the Home Loans CRM "Leads" view against Periskope contact labels, matched by phone number — a sanity check for where the two systems disagree.</div>
    <div class="refresh-note">–</div>
  </header>

  <table>
    <thead><tr><th>Check</th><th class="num">Count</th></tr></thead>
    <tbody id="airtable-table"></tbody>
  </table>
  <div class="footnote" id="airtable-footnote"></div>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="title" id="modal-title"></div>
        <div class="count-badge" id="modal-count"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const REFRESH_MS = 12 * 60 * 60 * 1000;
let data = null;

function currentTheme(){ return document.documentElement.getAttribute('data-theme') || 'light'; }
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('truva-theme', t); } catch(e){}
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = t === 'dark' ? 'Light' : 'Dark';
}
setTheme(currentTheme());
document.getElementById('theme-toggle').addEventListener('click', () => {
  setTheme(currentTheme() === 'dark' ? 'light' : 'dark');
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

const overlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalCount = document.getElementById('modal-count');
const modalBody = document.getElementById('modal-body');

function renderModal(title, contacts, emptyMessage) {
  modalTitle.textContent = title;
  const count = (contacts || []).length;
  modalCount.textContent = count + (count === 1 ? ' contact' : ' contacts');
  if (!contacts) {
    modalBody.innerHTML = `<div class="modal-empty">${emptyMessage}</div>`;
  } else if (contacts.length === 0) {
    modalBody.innerHTML = '<div class="modal-empty">No contacts here.</div>';
  } else {
    modalBody.innerHTML = contacts.map(c => `
      <div class="contact-row">
        <span class="cname">${escapeHtml(c.name)}${c.detail ? `<div class="cdetail">${escapeHtml(c.detail)}</div>` : ''}</span>
        <span class="cphone">${escapeHtml(c.phone)}</span>
      </div>`
    ).join('');
  }
  overlay.classList.add('open');
}
function openAirtableModal(key, title) {
  const sync = (data && data.airtable_sync) || null;
  if (!sync) { renderModal(title, null, "Airtable sync hasn't run yet — add the AIRTABLE_TOKEN secret and re-run the workflow."); return; }
  let contacts;
  if (key === 'in_airtable_not_periskope') {
    contacts = sync.in_airtable_not_periskope.map(c => ({ name: c.name, phone: c.phone, detail: 'Airtable status: ' + (c.status || '—') }));
  } else if (key === 'in_periskope_home_loans_not_airtable') {
    contacts = sync.in_periskope_home_loans_not_airtable.map(c => ({ name: c.name, phone: c.phone, detail: (c.labels || []).length ? 'Periskope labels: ' + c.labels.join(', ') : 'No other Periskope labels' }));
  } else {
    contacts = sync.status_label_mismatches.map(c => ({ name: c.name, phone: c.phone, detail: `Airtable: "${c.airtable_status}" · Periskope missing "${c.expected_periskope_label}"` }));
  }
  renderModal(title, contacts, 'No contacts here.');
}
function closeModal() { overlay.classList.remove('open'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

async function loadDashboard() {
  try {
    const res = await fetch('data.json?_=' + Date.now());
    data = await res.json();
  } catch (e) {
    document.body.innerHTML = '<p style="color:#FF4802;font-family:sans-serif;padding:40px;">Could not load data.json. Make sure it sits next to this HTML file and the GitHub Action has run at least once.</p>';
    return;
  }

  if (data.generated_at) {
    document.querySelector('.refresh-note').textContent = 'Last updated: ' + new Date(data.generated_at).toLocaleString();
  }

  const tbody = document.getElementById('airtable-table');
  const footnote = document.getElementById('airtable-footnote');
  const sync = data.airtable_sync;
  tbody.innerHTML = '';
  if (!sync) {
    tbody.innerHTML = '<tr><td colspan="2" style="color:var(--muted);text-align:center;">Not connected yet — add the AIRTABLE_TOKEN secret and re-run the workflow to enable this check.</td></tr>';
    footnote.textContent = '';
    return;
  }
  const rows = [
    ['Total leads in Airtable (Home Loans CRM → Leads)', sync.leads_total, null],
    ['Leads with no phone number on file', sync.leads_missing_phone, null],
    ['Matched to a Periskope contact', sync.matched, null],
    ['In Airtable, no matching Periskope contact', sync.in_airtable_not_periskope.length, 'in_airtable_not_periskope'],
    ['Periskope "Home Loans" contact, not in Airtable Leads', sync.in_periskope_home_loans_not_airtable.length, 'in_periskope_home_loans_not_airtable'],
    ['Status (Airtable) vs Label (Periskope) mismatch', sync.status_label_mismatches.length, 'status_label_mismatches'],
  ];
  rows.forEach(([label, val, key]) => {
    const tr = document.createElement('tr');
    const safeLabel = label.replace(/'/g, "\\'");
    let cellHtml;
    if (key && val > 0) {
      cellHtml = `<td class="num clickable" onclick="openAirtableModal('${key}','${safeLabel}')">${val}</td>`;
    } else if (key) {
      cellHtml = `<td class="num zero">${val}</td>`;
    } else {
      cellHtml = `<td class="num">${val}</td>`;
    }
    tr.innerHTML = `<td>${label}</td>${cellHtml}`;
    tbody.appendChild(tr);
  });
  footnote.textContent = `Last checked ${new Date(sync.generated_at).toLocaleString()} · matched by phone number (last 10 digits) · only Active Warm / Still Looking / Future Plan / Registration Complete statuses have a direct Periskope-label equivalent, so other statuses (Blocking Paid, MOU Signed, Not Qualified, Lost, etc.) aren't included in the mismatch check.`;
}

loadDashboard();
setInterval(loadDashboard, REFRESH_MS);
</script>
</body>
</html>
